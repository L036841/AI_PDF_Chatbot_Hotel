<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landon Hotel Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 600px;
        }

        .chat-header {
            background: #1a3c5e;
            color: white;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.bot {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: #1a3c5e;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 14px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #1a3c5e;
        }

        .chat-input button {
            background: #1a3c5e;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #14304d;
        }

        .typing {
            font-size: 13px;
            color: #999;
            align-self: flex-start;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="dot"></div>
            Landon Hotel — Night Manager
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot">Hello! I'm the Night Manager at Landon Hotel. How can I help you today?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask about Landon Hotel..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("userInput");
        const messages = document.getElementById("messages");

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        function appendMessage(text, sender) {
            const msg = document.createElement("div");
            msg.className = `message ${sender}`;
            msg.textContent = text;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            appendMessage(question, "user");
            input.value = "";

            const typing = document.createElement("div");
            typing.className = "typing";
            typing.textContent = "Night Manager is typing...";
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                messages.removeChild(typing);
                appendMessage(data.answer, "bot");
            } catch (err) {
                messages.removeChild(typing);
                appendMessage("Something went wrong. Please try again.", "bot");
            }
        }
    </script>
</body>
</html>
